<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobLens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      background: #1a1a2e;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo { font-size: 18px; font-weight: 800; flex: 1; }
    .beta {
      font-size: 10px;
      background: #534AB7;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }
    .body { padding: 16px; }
    .status-card {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #1D9E75; }
    .dot-red    { background: #E24B4A; }
    .dot-amber  { background: #BA7517; }
    .status-text { font-size: 12px; color: #444; }
    .status-text strong { color: #1a1a1a; }
    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-bottom: 8px;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #534AB7; color: white; }
    .btn-primary:hover { background: #3C3489; }
    .btn-outline { background: transparent; color: #534AB7; border: 1.5px solid #534AB7; }
    .btn-outline:hover { background: #EEEDFE; }
    .divider { height: 1px; background: #f0f0f0; margin: 12px 0; }
    .footer {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .nav-btn {
      background: #f5f5f5;
      border: none;
      border-radius: 8px;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #444;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #EEEDFE; color: #534AB7; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">JobLens</span>
    <span class="beta">AI</span>
  </div>

  <div class="body">
    <!-- Status cards -->
    <div class="status-card" id="api-status">
      <div class="status-dot dot-red" id="api-dot"></div>
      <div class="status-text"><strong>API Key:</strong> <span id="api-text">Not set</span></div>
    </div>
    <div class="status-card" id="resume-status">
      <div class="status-dot dot-red" id="resume-dot"></div>
      <div class="status-text"><strong>Resume:</strong> <span id="resume-text">Not added</span></div>
    </div>

    <div class="divider"></div>

    <!-- Quick nav -->
    <div class="nav-grid">
      <button class="nav-btn" id="open-settings">Settings</button>
      <button class="nav-btn" id="open-tracker">My Applications</button>
    </div>

    <button class="btn btn-primary" id="open-linkedin">Search LinkedIn Jobs</button>
    <button class="btn btn-outline" id="open-indeed">Search Indeed Jobs</button>
  </div>

  <div class="footer">Navigate to a LinkedIn or Indeed job page — JobLens sidebar will appear automatically.</div>

  <script src="popup.js"></script>
</body>
</html>

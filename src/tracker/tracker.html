<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobLens — My Applications</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 32px 16px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header {
      background: #1a1a2e;
      color: white;
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .logo { font-size: 20px; font-weight: 800; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .empty {
      background: white;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      color: #888;
      font-size: 14px;
      line-height: 1.8;
    }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .status-Applied    { background: #E6F1FB; color: #0C447C; }
    .status-Interview  { background: #EAF3DE; color: #27500A; }
    .status-Rejected   { background: #FCEBEB; color: #791F1F; }
    .status-Offer      { background: #E1F5EE; color: #085041; }
    .score-high { color: #1D9E75; font-weight: 700; }
    .score-mid  { color: #BA7517; font-weight: 700; }
    .score-low  { color: #E24B4A; font-weight: 700; }
    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .btn-delete:hover { color: #E24B4A; background: #FCEBEB; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-num { font-size: 26px; font-weight: 800; color: #534AB7; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">My Applications</div>
      <div class="subtitle">Track your job search progress</div>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total Applied</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-interview" style="color:#1D9E75">0</div><div class="stat-label">Interviews</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-avg" style="color:#BA7517">0%</div><div class="stat-label">Avg Match Score</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-offer" style="color:#085041">0</div><div class="stat-label">Offers</div></div>
    </div>
    <div id="tracker-content"></div>
  </div>
  <script src="tracker.js"></script>
</body>
</html>
